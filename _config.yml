title: 100 Days of CUDA
description: My Notes and codes documentation for CUDA learning journey 
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme

markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge
  mathjax_inline_math: [['$','$'], ['\\(','\\)']]
  mathjax_display_math: [['$$','$$'], ['\\[','\\]']]

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

include: [ "_includes/head-custom.html" ]


