<!-- Google Fonts: Inter & JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet">

<!-- Highlight.js for IDE-style syntax highlighting -->
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

<!-- MathJax 3 Configuration -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      processEnvironments: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>

<!-- Premium UI Components -->
<div class="dark-aurora-bg"></div>
<div id="premium-code-modal" class="code-modal-overlay" style="display:none;">
  <div class="code-modal-container">
    <div class="code-modal-header">
      <div class="modal-file-info">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="var(--accent-secondary)" stroke-width="2" fill="none">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
          <polyline points="13 2 13 9 20 9" />
        </svg>
        <span id="modal-filename">filename.cu</span>
      </div>
      <div class="modal-controls">
        <button id="copy-code-btn" class="modal-btn" title="Copy Code">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M8 4v8H4V4h4m2-2H2v12h8V2zM18 12v8h-4v-8h4m2-2h-8v12h8V10z" />
          </svg>
          <span>Copy</span>
        </button>
        <button id="close-modal-btn" class="modal-btn close-btn" title="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
    <div class="code-modal-body">
      <pre><code id="modal-code-block" class="hljs"></code></pre>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const modal = document.getElementById('premium-code-modal');
    const codeBlock = document.getElementById('modal-code-block');
    const filenameLabel = document.getElementById('modal-filename');
    const closeBtn = document.getElementById('close-modal-btn');
    const copyBtn = document.getElementById('copy-code-btn');

    // 1. Premium Link Interception
    document.addEventListener('click', function (e) {
      let target = e.target.closest('a');
      if (!target) return;

      let href = target.getAttribute('href');
      if (href && (href.endsWith('.cu') || href.endsWith('.py'))) {
        e.preventDefault();
        openCodeViewer(href);
      }
    });

    async function openCodeViewer(url) {
      let rawUrl = url;
      if (url.includes('github.com')) {
        rawUrl = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
      }

      let filename = url.split('/').pop();
      filenameLabel.textContent = filename;
      codeBlock.textContent = "// Fetching source...";
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';

      try {
        const response = await fetch(rawUrl);
        const code = await response.text();
        codeBlock.textContent = code;
        codeBlock.className = 'hljs ' + (filename.endsWith('.cu') ? 'language-cpp' : 'language-python');
        hljs.highlightElement(codeBlock);
      } catch (err) {
        codeBlock.textContent = "// Error: Could not fetch the code. \n// Link: " + url;
      }
    }

    closeBtn.onclick = () => {
      modal.style.display = 'none';
      document.body.style.overflow = 'auto';
    };

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(codeBlock.textContent);
      const originalContent = copyBtn.innerHTML;
      copyBtn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" stroke="#10b981" stroke-width="2" fill="none"><path d="M20 6L9 17l-5-5"/></svg><span>Copied!</span>';
      setTimeout(() => {
        copyBtn.innerHTML = originalContent;
      }, 2000);
    };

    // 2. MathJax Bridge
    function processMath() {
      document.querySelectorAll('code.language-math').forEach(block => {
        const parent = block.parentElement;
        if (parent && parent.tagName === 'PRE') {
          const div = document.createElement('div');
          div.className = 'premium-math-block';
          div.textContent = '$$' + block.textContent + '$$';
          parent.replaceWith(div);
        }
      });
      if (window.MathJax && window.MathJax.typeset) window.MathJax.typeset();
    }
    processMath();
    setTimeout(processMath, 1500);

    // 3. Navigation Injection & Layout Fix
    const path = window.location.pathname;
    if (path.includes('/Day_')) {
      const match = path.match(/Day_(\d+)/);
      if (match) {
        const currentDay = parseInt(match[1]);
        const prevDay = currentDay > 1 ? `Day_${(currentDay - 1).toString().padStart(2, '0')}` : null;
        const nextDay = currentDay < 100 ? `Day_${(currentDay + 1).toString().padStart(2, '0')}` : null;

        const nav = document.createElement('div');
        nav.className = 'premium-nav-bar';

        let navContent = `<a href="../" class="nav-link home-link"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</a>`;

        if (prevDay) navContent += `<a href="../${prevDay}/" class="nav-link"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"/></svg> Prev</a>`;
        if (nextDay) navContent += `<a href="../${nextDay}/" class="nav-link">Next <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="9 18 15 12 9 6"/></svg></a>`;

        nav.innerHTML = navContent;
        document.querySelector('.wrapper').prepend(nav);
      }
    }
  });
</script>

<style>
  :root {
    --bg-color: #020617;
    --surface-color: rgba(15, 23, 42, 0.7);
    --glass-border: rgba(255, 255, 255, 0.12);
    --accent-primary: #a855f7;
    --accent-secondary: #22d3ee;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --text-bright: #ffffff;
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg-color) !important;
    color: var(--text-main) !important;
    font-family: var(--font-sans) !important;
    margin: 0 !important;
    padding: 0 !important;
    line-height: 1.8 !important;
    overflow-x: hidden;
  }

  /* Dark Aurora Animated Background */
  .dark-aurora-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 50% 10%, rgba(30, 58, 138, 0.2) 0%, transparent 60%);
    filter: blur(80px);
    z-index: -1;
    animation: aurora-shift 20s ease-in-out infinite alternate;
  }

  @keyframes aurora-shift {
    0% {
      transform: scale(1) translate(0, 0);
    }

    100% {
      transform: scale(1.1) translate(2%, 2%);
    }
  }

  .wrapper {
    max-width: 1000px !important;
    margin: 80px auto !important;
    padding: 60px !important;
    background: var(--surface-color) !important;
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border: 1px solid var(--glass-border) !important;
    border-radius: 40px !important;
    box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8),
      inset 0 1px 1px rgba(255, 255, 255, 0.05) !important;
    float: none !important;
    position: relative !important;
    z-index: 100 !important;
  }

  header {
    width: 100% !important;
    float: none !important;
    position: static !important;
    padding: 0 0 40px 0 !important;
    margin: 0 0 40px 0 !important;
    border-bottom: 1px solid var(--glass-border) !important;
  }

  header h1 {
    font-size: 3.2rem !important;
    font-weight: 900 !important;
    letter-spacing: -0.05em !important;
    background: linear-gradient(135deg, var(--text-bright) 30%, var(--accent-secondary)) !important;
    -webkit-background-clip: text !important;
    background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    margin-bottom: 12px !important;
  }

  header p {
    font-size: 1.2rem !important;
    color: var(--text-muted) !important;
    font-weight: 400 !important;
  }

  section {
    width: 100% !important;
    float: none !important;
  }

  /* Critical Bold Fix: Ensure bold text pops */
  strong,
  b {
    color: var(--text-bright) !important;
    font-weight: 700 !important;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
  }

  h1,
  h2,
  h3,
  h4 {
    color: var(--text-bright) !important;
    margin-top: 2.5em !important;
    margin-bottom: 1em !important;
    letter-spacing: -0.02em !important;
  }

  p,
  li {
    font-size: 1.1rem !important;
    color: #cbd5e1 !important;
    margin-bottom: 1.2em !important;
  }

  a {
    color: var(--accent-secondary) !important;
    text-decoration: none !important;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
    border-bottom: 1px solid transparent;
  }

  a:hover {
    color: var(--text-bright) !important;
    border-bottom-color: var(--accent-secondary);
    text-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
  }

  /* Navigation Bar */
  .premium-nav-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--glass-border);
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    color: var(--text-main) !important;
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.3s !important;
  }

  .nav-link:hover {
    background: rgba(255, 255, 255, 0.08);
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
    border-color: var(--accent-secondary);
  }

  /* Tables Enhancement */
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: 40px 0;
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.2);
  }

  th {
    background: rgba(255, 255, 255, 0.05) !important;
    color: var(--text-bright) !important;
    padding: 20px !important;
    font-weight: 700 !important;

    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  td {
    padding: 20px !important;
    border-top: 1px solid var(--glass-border);
    transition: background 0.2s;
  }

  tr:hover td {
    background: rgba(255, 255, 255, 0.03);
  }

  details {
    background: rgba(255, 255, 255, 0.02);
    border-radius: 24px;
    border: 1px solid var(--glass-border);
    padding: 0 30px;
    margin: 30px 0;
    transition: all 0.3s;
  }

  details[open] {
    background: rgba(255, 255, 255, 0.04);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
  }

  summary {
    padding: 24px 0;
    font-weight: 800;
    color: var(--accent-secondary);
    cursor: pointer;
    list-style: none;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  summary::before {
    content: '→';
    display: inline-block;
    transition: transform 0.3s;
    color: var(--accent-primary);
  }

  details[open] summary::before {
    transform: rotate(90deg);
  }

  /* Code Viewer Modal */
  .code-modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(2, 6, 23, 0.9);
    backdrop-filter: blur(20px);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    animation: modalFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .code-modal-container {
    width: 100%;
    max-width: 1300px;
    height: 90%;
    background: #0f172a;
    border-radius: 32px;
    border: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    box-shadow: 0 60px 120px rgba(0, 0, 0, 0.8);
    overflow: hidden;
  }

  .code-modal-header {
    background: rgba(255, 255, 255, 0.02);
    padding: 24px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--glass-border);
  }

  #modal-filename {
    color: var(--text-bright);
    font-family: var(--font-mono);
    font-size: 1rem;
    font-weight: 500;
  }

  .modal-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    color: #fff;
    padding: 12px 24px;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.2s;
  }

  .modal-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-2px);
  }

  .close-btn {
    color: #f87171 !important;
  }

  .close-btn:hover {
    background: rgba(248, 113, 113, 0.1) !important;
  }

  .code-modal-body {
    flex: 1;
    overflow: auto;
    padding: 0;
    background: #020617;
  }

  pre code.hljs {
    padding: 40px !important;
    background: transparent !important;
    font-family: var(--font-mono) !important;
    font-size: 1rem !important;
    line-height: 1.6 !important;
  }

  /* Math Blocks */
  .premium-math-block {
    background: rgba(139, 92, 246, 0.03);
    border-radius: 24px;
    padding: 50px;
    margin: 50px 0;
    border: 1px solid rgba(139, 92, 246, 0.1);
    box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.4);
    text-align: center;
  }

  footer {
    display: none !important;
  }

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }

  ::-webkit-scrollbar-track {
    background: #020617;
  }

  ::-webkit-scrollbar-thumb {
    background: #1e293b;
    border-radius: 10px;
    border: 2px solid #020617;
  }

  ::-webkit-scrollbar-thumb:hover {

  }

  @keyframes modalFadeIn {
    from {
      opacity: 0;
      transform: scale(0.95) translateY(20px);
    }

    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  @media (max-width: 768px) {
    .wrapper {
      margin: 20px !important;
      padding: 25px !important;
      border-radius: 24px !important;
    }

    header h1 {
      font-size: 2.2rem !important;
    }

    .nav-link span {
      display: none;
    }

    }
  }
</style>
