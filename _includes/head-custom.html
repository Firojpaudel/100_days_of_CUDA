<!-- Premium UI Components -->
<div id="premium-code-modal" class="code-modal-overlay" style="display:none;">
  <div class="code-modal-container">
    <div class="code-modal-header">
      <div class="macos-controls">
        <div class="dot close red" id="close-modal-btn"></div>
        <div class="dot minimize yellow"></div>
        <div class="dot maximize green"></div>
      </div>
      <div class="modal-file-info">
        <span id="modal-filename">filename.cu</span>
      </div>
      <div class="modal-controls">
        <button id="copy-code-btn" class="modal-btn" title="Copy Code">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M8 4v8H4V4h4m2-2H2v12h8V2zM18 12v8h-4v-8h4m2-2h-8v12h8V10z" />
          </svg>
          <span>Copy</span>
        </button>
      </div>
    </div>
    <div class="code-modal-body">
      <pre><code id="modal-code-block" class="hljs"></code></pre>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const modal = document.getElementById('premium-code-modal');
    const codeBlock = document.getElementById('modal-code-block');
    const filenameLabel = document.getElementById('modal-filename');
    const closeBtn = document.getElementById('close-modal-btn');
    const copyBtn = document.getElementById('copy-code-btn');

    // 1. Premium Link Interception
    document.addEventListener('click', function (e) {
      let target = e.target.closest('a');
      if (!target) return;

      let href = target.getAttribute('href');
      if (href && (href.endsWith('.cu') || href.endsWith('.py'))) {
        e.preventDefault();
        openCodeViewer(href);
      }
    });

    async function openCodeViewer(url) {
      let rawUrl = url;
      if (url.includes('github.com')) {
        rawUrl = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
      }

      let filename = url.split('/').pop();
      filenameLabel.textContent = filename;
      codeBlock.textContent = "// Fetching source...";
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';

      try {
        const response = await fetch(rawUrl);
        const code = await response.text();
        codeBlock.textContent = code;
        codeBlock.className = 'hljs ' + (filename.endsWith('.cu') ? 'language-cpp' : 'language-python');
        hljs.highlightElement(codeBlock);
      } catch (err) {
        codeBlock.textContent = "// Error: Could not fetch the code. \n// Link: " + url;
      }
    }

    closeBtn.onclick = () => {
      modal.style.display = 'none';
      document.body.style.overflow = 'auto';
    };

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(codeBlock.textContent);
      const originalContent = copyBtn.innerHTML;
      copyBtn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" stroke="#10b981" stroke-width="2" fill="none"><path d="M20 6L9 17l-5-5"/></svg><span>Copied!</span>';
      setTimeout(() => {
        copyBtn.innerHTML = originalContent;
      }, 2000);
    };

    // 2. MathJax Bridge
    function processMath() {
      document.querySelectorAll('code.language-math').forEach(block => {
        const parent = block.parentElement;
        if (parent && parent.tagName === 'PRE') {
          const div = document.createElement('div');
          div.className = 'premium-math-block';
          div.textContent = '$$' + block.textContent + '$$';
          parent.replaceWith(div);
        }
      });
      if (window.MathJax && window.MathJax.typeset) window.MathJax.typeset();
    }
    processMath();
    setTimeout(processMath, 1500);

    // 3. Navigation Injection & Layout Fix
    const path = window.location.pathname;
    if (path.includes('/Day_')) {
      const match = path.match(/Day_(\d+)/);
      if (match) {
        const currentDay = parseInt(match[1]);
        const prevDay = currentDay > 1 ? `Day_${(currentDay - 1).toString().padStart(2, '0')}` : null;
        const nextDay = currentDay < 100 ? `Day_${(currentDay + 1).toString().padStart(2, '0')}` : null;

        const nav = document.createElement('div');
        nav.className = 'premium-nav-bar';

        let navContent = `<a href="../" class="nav-link home-link"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</a>`;

        if (prevDay) navContent += `<a href="../${prevDay}/" class="nav-link"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"/></svg> Prev</a>`;
        if (nextDay) navContent += `<a href="../${nextDay}/" class="nav-link">Next <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="9 18 15 12 9 6"/></svg></a>`;

        nav.innerHTML = navContent;
        document.querySelector('.wrapper').prepend(nav);
      }
    }

    // 4. Force Obsidian Dark on all Code blocks
    const observer = new MutationObserver((mutations) => {
      document.querySelectorAll('pre, .highlight, .highlighter-rouge').forEach(el => {
        el.style.setProperty('background', 'transparent', 'important');
        el.style.setProperty('background-color', 'transparent', 'important');
        el.style.setProperty('background-image', 'none', 'important');
        el.style.setProperty('border', 'none', 'important');
      });
      // Specifically target inline code to ensure it keeps its pill look
      document.querySelectorAll(':not(pre) > code').forEach(el => {
        el.style.setProperty('background', 'rgba(255, 255, 255, 0.1)', 'important');
        el.style.setProperty('color', '#ffffff', 'important');
      });
    });
    function transformGitHubLink() {
      const ghLinkStr = "View the Project on GitHub";
      const headerLinks = document.querySelectorAll('header a');

      headerLinks.forEach(link => {
        if (link.textContent.includes(ghLinkStr)) {
          link.innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 15px;">
              <svg height="28" aria-hidden="true" viewBox="0 0 16 16" version="1.1" width="28" style="fill: #ffffff; transition: opacity 0.2s;"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
              <span style="font-size: 0.95rem; font-weight: 600; color: #ffffff; letter-spacing: 0.02em;">GitHub Repository</span>
            </div>
          `;
          link.style.display = "inline-block";
          link.style.textDecoration = "none";
          link.style.border = "none";
          link.onmouseover = () => link.style.opacity = "0.7";
          link.onmouseout = () => link.style.opacity = "1";

          const small = link.nextElementSibling;
          if (small && small.tagName === 'SMALL') {
            small.style.display = 'none';
          }
        }
      });
    }
    transformGitHubLink();
    setTimeout(transformGitHubLink, 500);
    observer.observe(document.body, { childList: true, subtree: true });
  });
</script>
