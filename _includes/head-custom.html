<!-- Google Fonts: Inter & JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet">

<!-- Highlight.js for IDE-style syntax highlighting -->
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

<!-- MathJax 3 Configuration -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      processEnvironments: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>

<!-- Premium UI Components -->
<div id="premium-code-modal" class="code-modal-overlay" style="display:none;">
  <div class="code-modal-container">
    <div class="code-modal-header">
      <span id="modal-filename">filename.cu</span>
      <div class="modal-controls">
        <button id="copy-code-btn" title="Copy Code">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M8 4v8H4V4h4m2-2H2v12h8V2zM18 12v8h-4v-8h4m2-2h-8v12h8V10z" />
          </svg>
        </button>
        <button id="close-modal-btn" title="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
    <div class="code-modal-body">
      <pre><code id="modal-code-block" class="hljs"></code></pre>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const modal = document.getElementById('premium-code-modal');
    const codeBlock = document.getElementById('modal-code-block');
    const filenameLabel = document.getElementById('modal-filename');
    const closeBtn = document.getElementById('close-modal-btn');
    const copyBtn = document.getElementById('copy-code-btn');

    // 1. Premium Link Interception
    document.addEventListener('click', function (e) {
      let target = e.target.closest('a');
      if (!target) return;

      let href = target.getAttribute('href');
      if (href && (href.endsWith('.cu') || href.endsWith('.py'))) {
        e.preventDefault();
        openCodeViewer(href);
      }
    });

    async function openCodeViewer(url) {
      // Convert github.com blob URL to raw.githubusercontent.com
      let rawUrl = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
      let filename = url.split('/').pop();

      filenameLabel.textContent = filename;
      codeBlock.textContent = "Loading clean code...";
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';

      try {
        const response = await fetch(rawUrl);
        const code = await response.text();

        // Apply highlighting
        codeBlock.textContent = code;
        codeBlock.className = 'hljs ' + (filename.endsWith('.cu') ? 'language-cpp' : 'language-python');
        hljs.highlightElement(codeBlock);
      } catch (err) {
        codeBlock.textContent = "Error loading file. Plase check your connection or the link.";
      }
    }

    closeBtn.onclick = () => {
      modal.style.display = 'none';
      document.body.style.overflow = 'auto';
    };

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(codeBlock.textContent);
      copyBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" stroke="#10b981" stroke-width="2" fill="none"><path d="M20 6L9 17l-5-5"/></svg>';
      setTimeout(() => {
        copyBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M8 4v8H4V4h4m2-2H2v12h8V2zM18 12v8h-4v-8h4m2-2h-8v12h8V10z"/></svg>';
      }, 2000);
    };

    // 2. MathJax Bridge for ```math
    function processMath() {
      document.querySelectorAll('code.language-math').forEach(block => {
        const parent = block.parentElement;
        if (parent && parent.tagName === 'PRE') {
          const div = document.createElement('div');
          div.className = 'premium-math-block';
          div.textContent = '$$' + block.textContent + '$$';
          parent.replaceWith(div);
        }
      });
      if (window.MathJax && window.MathJax.typeset) window.MathJax.typeset();
    }
    processMath();
    setTimeout(processMath, 1500);
  });
</script>

<style>
  :root {
    --bg-color: #030712;
    --surface-color: rgba(17, 24, 39, 0.75);
    --glass-border: rgba(255, 255, 255, 0.1);
    --accent-primary: #8b5cf6;
    --accent-secondary: #06b6d4;
    --text-main: #f9fafb;
    --text-muted: #9ca3af;
    --font-sans: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body {
    background: radial-gradient(circle at top left, #1e1b4b, var(--bg-color)) no-repeat fixed;
    color: var(--text-main);
    font-family: var(--font-sans);
    margin: 0;
  }

  .wrapper {
    max-width: 1100px !important;
    margin: 40px auto !important;
    background: var(--surface-color);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 40px !important;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  header {
    width: 100% !important;
    float: none !important;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--glass-border);
    padding-bottom: 20px;
  }

  section {
    width: 100% !important;
    float: none !important;
  }

  header h1 {
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Code Modal Styles */
  .code-modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
  }

  .code-modal-container {
    width: 90%;
    max-width: 1000px;
    height: 80%;
    background: #1a1b26;
    border-radius: 16px;
    border: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
    overflow: hidden;
  }

  .code-modal-header {
    background: rgba(255, 255, 255, 0.05);
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--glass-border);
    font-family: var(--font-mono);
    font-size: 0.9em;
  }

  .code-modal-body {
    flex: 1;
    overflow: auto;
    padding: 20px;
  }

  .modal-controls button {
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
    margin-left: 15px;
  }

  .modal-controls button:hover {
    opacity: 1;
  }

  /* Math Blocks */
  .premium-math-block {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    padding: 20px;
    margin: 25px 0;
    border: 1px solid var(--glass-border);
    text-align: center;
  }

  /* Animations */
  @keyframes fadeIn {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }

  /* Typo fixes */
  footer {
    display: none !important;
  }

  ::-webkit-scrollbar {
    width: 10px;
  }

  ::-webkit-scrollbar-track {
    background: var(--bg-color);
  }

  ::-webkit-scrollbar-thumb {
    background: var(--glass-border);
    border-radius: 10px;
    border: 2px solid var(--bg-color);
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent-primary);
  }

  /* UI Polishing */
  h1,
  h2,
  h3 {
    color: #fff;
  }

  a {
    color: var(--accent-secondary);
    transition: 0.2s;
  }

  a:hover {
    color: var(--accent-primary);
  }

  table {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--glass-border);
    width: 100%;
    margin: 20px 0;
    border-collapse: collapse;
  }

  th {
    background: rgba(255, 255, 255, 0.05);
    padding: 15px;
    text-align: left;
  }

  td {
    padding: 15px;
    border-top: 1px solid var(--glass-border);
  }

  details {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    border: 1px solid var(--glass-border);
    padding: 15px;
    margin: 15px 0;
  }

  summary {
    font-weight: 600;
    color: var(--accent-secondary);
    cursor: pointer;
  }
</style>
